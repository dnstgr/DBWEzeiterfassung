{% extends 'base.html' %}
{% block title %}Registrieren - Zeiterfassung{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Registrieren</h2>
    <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="form-group">
            <label for="username">Benutzername</label>
            <input type="text" id="username" name="username" required
                   placeholder="Mindestens 3 Zeichen" minlength="3" autofocus>
        </div>
        <div class="form-group">
            <label for="email">E-Mail</label>
            <input type="email" id="email" name="email" required
                   placeholder="name@beispiel.ch">
        </div>
        <div class="form-group">
            <label for="password">Passwort</label>
            <input type="password" id="password" name="password" required
                   placeholder="Mindestens 8 Zeichen" minlength="8">
        </div>
        <div class="form-group">
            <label for="password_confirm">Passwort best&auml;tigen</label>
            <input type="password" id="password_confirm" name="password_confirm" required
                   placeholder="Passwort wiederholen">
        </div>
        <button type="submit" class="btn btn-primary">Registrieren</button>
    </form>
    <p class="auth-link">
        Bereits ein Konto? <a href="{{ url_for('auth.login') }}">Jetzt anmelden</a>
    </p>
</div>
{% endblock %}
